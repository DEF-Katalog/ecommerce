<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Furniture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <h1>Admin Panel</h1>

  <!-- FORM PRODUK -->
  <div class="form-box">

    <input type="text" id="name" placeholder="Nama Produk"><br><br>
    <textarea id="description" placeholder="Deskripsi"></textarea><br><br>
    <input type="text" id="image" placeholder="URL Gambar"><br><br>

    <hr>

    <h3>Tambah Variant</h3>

    <input type="text" id="size" placeholder="Ukuran">
    <input type="number" id="price" placeholder="Harga">
    <button id="addVariantBtn">Tambah Variant</button>

    <div id="variantPreview"></div>

    <br>
    <button type="button" id="saveProductBtn">
  Simpan Produk
</button>

  </div>

  <hr>

  <h2>Daftar Produk</h2>
  <div id="adminProductList"></div>

  <script type="module" src="./js/admin.js"></script>

  <div id="toast"></div>
</body>
</html>
