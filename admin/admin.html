<!DOCTYPE html>
<html>
<head>
  <title>Admin Page</title>

  <style>
  body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
  }

  input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
  }

  button {
    padding: 8px 12px;
    margin-right: 5px;
    cursor: pointer;
  }

  h1, h2 {
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
  }

  .product-card {
    background: #f9f9f9;
    padding: 10px;
    margin-bottom: 10px;
  }

    .error {
  color: red;
  font-size: 12px;
  display: block;
  margin-bottom: 8px;
}
    
</style>
  
  
</head>
<body>

<h1>Tambah Produk</h1>

<input type="text" id="productName" placeholder="Nama Produk"><br><br>
<textarea id="productDesc" placeholder="Deskripsi"></textarea><br><br>

<h3>Varian</h3>

<div id="variantContainer"></div>

<button id="addVariantBtn">Tambah Varian</button>
<br><br>

<button id="saveProductBtn">Simpan Produk</button>

<button id="cancelEditBtn" style="display:none;">Cancel</button>

<hr>
<h2>Daftar Produk</h2>
<div id="productList"></div>

<script type="module" src="./AdminController.js"></script>

</body>
</html>
